<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="논문 데이터 한눈에 보기 대시보드">
    <title>연구 동향 대시보드</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard-container">
        <header class="header">
            <h1 class="title">논문 연구 동향 대시보드</h1>
            <p class="subtitle">SNS 중독 관련 논문 데이터를 기반으로 분석한 주요 지표입니다.</p>
        </header>

        <main class="grid-container">
            <!-- 1. 연도별 논문 수 그래프 -->
            <section class="card slide-in" id="card-yearly">
                <div class="card-header">
                    <h2>📈 연도별 논문 수 추이</h2>
                </div>
                <div class="chart-wrapper">
                    <canvas id="yearlyChart"></canvas>
                </div>
            </section>

            <!-- 2. 키워드 빈도 분석 -->
            <section class="card slide-in delay-1" id="card-keywords">
                <div class="card-header">
                    <h2>🏷️ 주요 키워드 빈도</h2>
                </div>
                <div class="chart-wrapper">
                    <canvas id="keywordChart"></canvas>
                </div>
            </section>

            <!-- 3. 학술지 분포 -->
            <section class="card slide-in delay-2" id="card-journals">
                <div class="card-header">
                    <h2>📖 학술지별 논문 분포</h2>
                </div>
                <div class="chart-wrapper">
                    <canvas id="journalChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- 데이터 파일 로드 -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
